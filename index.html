<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Checklists</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f6ff;min-height:100vh}

/* LOGIN */
#loginView{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;flex-direction:column;gap:20px}
.login-logo{display:flex;align-items:center;gap:12px}
.login-logo svg{width:160px;height:auto}
.login-logo-text{font-size:1.4rem;font-weight:800;color:#1565C0;letter-spacing:-0.5px}
.login-card{background:white;border-radius:20px;box-shadow:0 4px 24px rgba(21,101,192,0.12);padding:32px;width:100%;max-width:360px}
.login-card p{font-size:0.8rem;color:#7a9cc4;text-align:center;margin-bottom:24px}
.login-card label{font-size:0.75rem;font-weight:600;color:#5a87c0;display:block;margin-bottom:4px;margin-top:12px}
.login-card input{width:100%;border:1.5px solid #BBDEFB;border-radius:8px;padding:9px 12px;font-family:inherit;font-size:0.88rem;outline:none;color:#1e2d3d}
.login-card input:focus{border-color:#1565C0}
.login-btn{width:100%;margin-top:18px;background:#1565C0;color:white;border:none;border-radius:10px;padding:11px;font-family:inherit;font-size:0.9rem;font-weight:700;cursor:pointer}
.login-btn:hover{background:#0d47a1}
.login-err{font-size:0.75rem;color:#e53935;text-align:center;margin-top:10px;min-height:18px}
.login-switch{font-size:0.78rem;color:#7a9cc4;text-align:center;margin-top:14px;cursor:pointer}
.login-switch span{color:#1565C0;font-weight:600}
.login-forgot{font-size:0.72rem;color:#90CAF9;text-align:center;margin-top:8px;cursor:pointer}
.login-forgot:hover{color:#1565C0}

/* TOPBAR */
.topbar{background:#1565C0;color:white;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.back-btn{background:rgba(255,255,255,0.15);border:none;color:white;border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit;font-size:0.8rem;display:none}
.back-btn:hover{background:rgba(255,255,255,0.25)}
.topbar-logo{display:flex;align-items:center;gap:8px}
.topbar-logo svg{width:44px;height:auto}
.topbar h1{font-size:0.95rem;font-weight:700;color:white}
.topbar-right{display:flex;align-items:center;gap:8px}
.user-lbl{font-size:0.7rem;color:rgba(255,255,255,0.75)}
.logout-btn{background:rgba(255,255,255,0.15);border:none;color:white;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;font-size:0.72rem}
.logout-btn:hover{background:rgba(255,255,255,0.25)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4caf50;animation:pulse 2s infinite;flex-shrink:0}
.sync-dot.off{background:#ff9800;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* VIEWS */
.view{display:none;padding:20px}
.view.active{display:block}

/* HOME */
.home-tabs{display:flex;max-width:900px;margin:0 auto 20px;border-bottom:2px solid #BBDEFB}
.tab-btn{font-family:inherit;font-size:0.85rem;font-weight:600;padding:8px 18px;border:none;background:transparent;color:#7a9cc4;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:#1565C0;border-bottom-color:#1565C0}
.tab-content{display:none;max-width:900px;margin:0 auto}
.tab-content.active{display:block}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.list-card{background:white;border-radius:14px;box-shadow:0 2px 10px rgba(21,101,192,0.08);padding:14px 16px;border:2px solid transparent;transition:border-color 0.15s;position:relative}
.list-card:hover{border-color:#90CAF9}
.list-card-body{cursor:pointer}
.list-card h3{font-size:0.92rem;font-weight:700;color:#1e2d3d;margin-bottom:4px;padding-right:20px;line-height:1.3}
.list-card .meta{font-size:0.72rem;color:#7a9cc4;margin-bottom:2px}
.list-card .trip-date{font-size:0.72rem;color:#1565C0;font-weight:600;margin-bottom:6px}
.list-card .prog{height:4px;background:#e3f2fd;border-radius:99px;margin-top:8px;overflow:hidden}
.list-card .prog-fill{height:100%;background:#1565C0;border-radius:99px}
.card-actions{display:flex;gap:4px;margin-top:10px;border-top:1px solid #f0f6ff;padding-top:8px}
.card-action-btn{font-family:inherit;font-size:0.68rem;font-weight:600;padding:3px 8px;border-radius:6px;border:1px solid #dce9f8;background:white;color:#5a87c0;cursor:pointer;flex:1;text-align:center}
.card-action-btn:hover{background:#e3f2fd;color:#1565C0}
.card-action-btn.danger:hover{background:#ffeaea;color:#e53935;border-color:#ffcdd2}
.card-del{position:absolute;top:10px;right:10px;background:none;border:none;color:#ccc;cursor:pointer;font-size:0.8rem;padding:2px 5px;border-radius:4px}
.card-del:hover{color:#e53935;background:#ffeaea}
.badge{display:inline-block;font-size:0.62rem;font-weight:700;border-radius:99px;padding:1px 7px;margin-bottom:5px;margin-right:3px}
.badge-tpl{background:#e3f2fd;color:#1565C0}
.badge-archive{background:#f3e5f5;color:#7b1fa2}
.new-card{background:white;border-radius:14px;border:2px dashed #90CAF9;padding:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:100px;transition:all 0.15s}
.new-card:hover{background:#e3f2fd;border-color:#1565C0}
.new-card span{font-size:1.5rem;color:#90CAF9}
.new-card p{font-size:0.8rem;color:#7a9cc4;font-weight:600}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:16px;padding:24px;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,0.15);max-height:90vh;overflow-y:auto}
.modal h2{font-size:1rem;font-weight:700;color:#1e2d3d;margin-bottom:16px}
.modal label{font-size:0.75rem;color:#5a87c0;font-weight:600;display:block;margin-bottom:4px;margin-top:12px}
.modal input[type=text],.modal input[type=email],.modal input[type=date],.modal textarea{width:100%;border:1.5px solid #BBDEFB;border-radius:8px;padding:8px 12px;font-family:inherit;font-size:0.88rem;outline:none;color:#1e2d3d}
.modal textarea{resize:vertical;min-height:60px}
.modal input:focus,.modal textarea:focus{border-color:#1565C0}
.template-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.template-opt{border:1.5px solid #BBDEFB;border-radius:8px;padding:8px 10px;cursor:pointer;font-family:inherit;font-size:0.78rem;color:#1e2d3d;background:white;text-align:left;font-weight:600;transition:all 0.15s}
.template-opt:hover{border-color:#1565C0;background:#e3f2fd}
.template-opt.selected{border-color:#1565C0;background:#1565C0;color:white}
.template-opt.blank{border-style:dashed;color:#7a9cc4}
.modal-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal-btns button{font-family:inherit;font-size:0.82rem;font-weight:600;padding:8px 18px;border-radius:8px;cursor:pointer;border:1.5px solid #BBDEFB;background:white;color:#1565C0}
.modal-btns .primary{background:#1565C0;color:white;border-color:#1565C0}
.modal-btns button:hover{opacity:0.85}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:10px 12px;background:#f0f6ff;border-radius:8px;gap:12px}
.toggle-row-text span{font-size:0.8rem;color:#1e2d3d;font-weight:600;display:block}
.toggle-row-text small{font-size:0.7rem;color:#7a9cc4}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#BBDEFB;border-radius:99px;cursor:pointer;transition:0.2s}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:white;border-radius:50%;transition:0.2s}
.toggle input:checked+.toggle-slider{background:#1565C0}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px)}

/* CHECKLIST VIEW */
.checklist-header{max-width:900px;margin:0 auto 12px;display:flex;flex-direction:column;align-items:center;gap:4px}
.checklist-title{font-size:1.25rem;font-weight:700;color:#1565C0;cursor:pointer;border-radius:6px;padding:2px 8px}
.checklist-title:hover{background:#dceeff}
.checklist-title-inp{font-size:1.25rem;font-weight:700;color:#1565C0;border:2px solid #90CAF9;border-radius:6px;padding:2px 8px;outline:none;font-family:inherit;text-align:center;width:300px}
.checklist-sub{font-size:0.72rem;color:#7a9cc4}

/* TRIP INFO BLOCK */
.trip-info-bar{max-width:900px;margin:0 auto 12px;background:white;border-radius:12px;border:1.5px solid #BBDEFB;padding:10px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.trip-info-field{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:#5a87c0}
.trip-info-field span{font-weight:600;color:#1565C0}
.trip-info-field input{border:none;outline:none;font-family:inherit;font-size:0.78rem;color:#1565C0;font-weight:600;background:transparent;cursor:pointer;width:110px}
.trip-info-field input:hover{text-decoration:underline}
.trip-info-field textarea{border:none;outline:none;font-family:inherit;font-size:0.78rem;color:#1565C0;font-weight:600;background:transparent;cursor:pointer;resize:none;width:160px;height:20px;overflow:hidden}
.trip-info-field textarea:hover{text-decoration:underline}

.prog-wrap{background:#dce9f8;border-radius:99px;height:6px;max-width:360px;width:100%;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,#1565C0,#42A5F5);border-radius:99px;transition:width 0.4s}
.prog-lbl{font-size:0.7rem;color:#5a87c0}
.cl-toolbar{display:flex;justify-content:flex-end;gap:8px;max-width:900px;margin:0 auto 12px;flex-wrap:wrap}
.btn{font-family:inherit;font-size:0.73rem;font-weight:600;padding:5px 11px;border-radius:8px;border:1.5px solid #90CAF9;background:white;color:#1565C0;cursor:pointer}
.btn:hover{background:#e3f2fd}

/* GRID & SECTIONS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;max-width:900px;margin:0 auto}
.section{background:white;border-radius:14px;box-shadow:0 2px 10px rgba(21,101,192,0.07);overflow:hidden;transition:opacity 0.15s,transform 0.15s}
.section.dragging{opacity:0.35;transform:scale(0.97)}
.section.drag-over{box-shadow:0 0 0 2.5px #1565C0}
.sec-head{background:#BBDEFB;padding:7px 10px 5px;display:flex;align-items:center;gap:4px}
.drag-handle{font-size:13px;color:#90CAF9;cursor:grab;padding:0 3px;flex-shrink:0;user-select:none}
.drag-handle:active{cursor:grabbing}
.sec-title{font-size:0.76rem;font-weight:700;color:#0D47A1;cursor:pointer;flex:1;border-radius:3px;padding:1px 3px}
.sec-title:hover{background:rgba(255,255,255,0.5)}
.sec-title-inp{font-size:0.76rem;font-weight:700;color:#0D47A1;border:1.5px solid #1565C0;border-radius:3px;padding:1px 4px;outline:none;font-family:inherit;background:white;flex:1;min-width:0}
.sec-count{font-size:0.65rem;background:white;color:#5a8fd4;border-radius:99px;padding:1px 6px;font-weight:600;flex-shrink:0}
.del-sec{font-size:0.68rem;color:#90CAF9;cursor:pointer;background:none;border:none;padding:1px 4px;border-radius:3px;flex-shrink:0;font-family:inherit}
.del-sec:hover{color:#e53935;background:rgba(255,255,255,0.6)}
.items{padding:3px 0}

/* ITEMS WITH DRAG */
.item{display:flex;align-items:flex-start;gap:6px;padding:3px 10px;border-radius:4px;margin:1px 3px;position:relative}
.item:hover{background:#f5f9ff}
.item.done{opacity:0.38}
.item.done .lbl{text-decoration:line-through}
.item.item-dragging{opacity:0.3}
.item.item-drag-over{border-top:2px solid #1565C0}
.item-drag-handle{font-size:11px;color:#c5d9f0;cursor:grab;flex-shrink:0;padding-top:3px;user-select:none;opacity:0}
.item:hover .item-drag-handle{opacity:1}
.item-drag-handle:active{cursor:grabbing}
.box{width:14px;height:14px;border:1.5px solid #90CAF9;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:white;cursor:pointer;transition:all 0.15s;margin-top:3px}
.item.done .box{background:#1565C0;border-color:#1565C0}
.item-content{flex:1;min-width:0}
.lbl{font-size:0.76rem;color:#1e2d3d;line-height:1.4;cursor:pointer;border-radius:3px;padding:1px 3px;display:block}
.lbl:hover{background:#e3f2fd}
.lbl-inp{font-size:0.76rem;color:#1e2d3d;border:1.5px solid #90CAF9;border-radius:3px;padding:1px 4px;outline:none;font-family:inherit;background:white;width:100%}
.item-note{font-size:0.68rem;color:#90CAF9;padding:0 3px 1px;cursor:pointer;font-style:italic;display:block}
.item-note:hover{color:#1565C0}
.item-note-inp{font-size:0.68rem;color:#5a87c0;border:1px solid #BBDEFB;border-radius:3px;padding:1px 4px;outline:none;font-family:inherit;background:white;width:100%;font-style:italic;margin-top:2px}
.item-actions{display:flex;gap:2px;flex-shrink:0;padding-top:2px}
.del-item,.note-btn{font-size:0.65rem;color:#ccc;opacity:0;padding:1px 3px;border-radius:3px;border:none;background:transparent;cursor:pointer;flex-shrink:0;font-family:inherit}
.item:hover .del-item,.item:hover .note-btn{opacity:1}
.del-item:hover{color:#e53935;background:#ffeaea}
.note-btn:hover{color:#1565C0;background:#e3f2fd}

.add-row{display:flex;align-items:center;gap:6px;padding:3px 10px 8px;border-top:1px dashed #dce9f8;margin-top:2px}
.add-box{width:14px;height:14px;border:1.5px dashed #90CAF9;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#90CAF9;font-weight:700}
.add-inp{flex:1;border:none;outline:none;font-family:inherit;font-size:0.76rem;color:#1e2d3d;background:transparent}
.add-inp::placeholder{color:#b0c8e8}
.add-sec-wrap{max-width:900px;margin:12px auto 0}
.add-sec-btn{width:100%;font-family:inherit;font-size:0.76rem;color:#1565C0;border:1.5px dashed #90CAF9;background:white;border-radius:14px;padding:9px;cursor:pointer;font-weight:600}
.add-sec-btn:hover{background:#e3f2fd}
.status{font-size:0.7rem;color:#7a9cc4;text-align:center;margin-top:8px;min-height:16px}

/* INLINE RENAME ON CARD */
.card-title-inp{font-size:0.92rem;font-weight:700;color:#1e2d3d;border:1.5px solid #90CAF9;border-radius:6px;padding:2px 6px;outline:none;font-family:inherit;width:100%;margin-bottom:4px}

@media print{.topbar,.cl-toolbar,.add-row,.del-item,.note-btn,.item-drag-handle,.drag-handle,.del-sec,.add-sec-wrap,.status,.card-actions,.trip-info-bar button{display:none!important}}
</style>
</head>

</div>

<!-- APP -->
<div id="appView" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" id="backBtn" onclick="goHome()">← Terug</button>
      <div class="topbar-logo">
        <svg viewBox="0 0 150 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="10" width="140" height="58" rx="9" fill="white" fill-opacity="0.9"/>

  <line x1="100" y1="36" x2="130" y2="36" stroke="white" stroke-width="0.8" stroke-opacity="0.5"/>

  <circle cx="60" cy="82" r="14" fill="white" fill-opacity="0.8"/>
  <circle cx="60" cy="82" r="9" fill="white" fill-opacity="0.5"/>
  <circle cx="60" cy="82" r="3.5" fill="white" fill-opacity="0.9"/>
  <circle cx="128" cy="12" r="14" fill="#4CAF50"/>
  <path d="M121 12l4 5 8-9" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
      </div>
      <h1 id="topbarTitle">Mijn Checklists</h1>
    </div>
    <div class="topbar-right">
      <span class="user-lbl" id="userLbl"></span>
      <div class="sync-dot off" id="dot"></div>

<!-- MODALS -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAXPAjc_gV56nSH7pEwa4aICVAjaoNx7kc",
  authDomain:        "reislijst-caravan.firebaseapp.com",
  databaseURL:       "https://reislijst-caravan-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "reislijst-caravan",
  storageBucket:     "reislijst-caravan.firebasestorage.app",
  messagingSenderId: "992765711731",
  appId:             "1:992765711731:web:37cdf225b60242d88b2106"
};

const ALLOWED_EMAILS = ["arnevanaelst@gmail.com","fampieters@outlook.be"];

const caravanSections = [
  {title:"📱 Elektronica",items:["GSM","GSM-laders","GSM-oortjes","E-reader + lader","Notitieboek voor onderweg","Gezelschapsspelletjes"]},
  {title:"👩 Madelief – Toilet",items:["Douchegel","Shampoo + conditioner","Tandpasta + tandenborstel","Oplader el. tandenborstel","Scheermesjes","Oorbellen","Inlegkruisjes","Medicatie (foliumzuur + vitaminen)"]},
  {title:"🍳 Keuken",items:["Servietten","Croque-ingrediënten (brood, kaas, ham)","Boter","Mayonaise / vinaigrette","Confituur / choco","Muizenstrontjes","Roico soep","Chips + versnapering","Eten zaterdag middag"]},
  {title:"👗 Madelief – Kledij",items:["Bikini","Kleedjes","1 BH","2 shorts","2 lange broeken / salopette","2 warmere truien / fleece","2 pyjama's","Jas","9 onderbroeken + 9 kousen","Teenslippers / sandalen / schoenen","Zonnebril","Training om te douchen"]},
  {title:"🥤 Drank",items:["Melk","Water (plat + spuit)","Chocomelk","Frisdrank (cola, ...)"]},
  {title:"👨 Arne – Toilet",items:["Douchegel (Axa + Uriage) / shampoo","Sensibio gezichtsreiniger","Tandpasta + tandenborstel","Oplader el. tandenborstel","Scheergerief","Lensenmateriaal + lenzenvocht","Reserve lenzen","Bril"]},
  {title:"💊 Apotheek",items:["Paracetamol","Buscopan","Flamigel","Fenigel","Aftersun","Zonemelk","Omnibionta","Elocom (beide tubes)","Body lotion (day/night – Kruidvat)"]},
  {title:"👖 Arne – Kledij",items:["Hemd / T-shirts / polo's","2 lange broeken","2 warmere truien","2 pyjama's","Jas","Zwembroek","9 onderbroeken + 9 kousen","Schoenen / teenslippers","Zonnebril","Training om te douchen"]},
  {title:"🚿 Badkamer",items:["Haarborstel","Haardroger / blazer","Schmink","Zak om te gaan douchen","Zakdoeken"]},
];

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const auth = getAuth(fbApp);

let currentUser=null, currentListId=null, currentListIsTemplate=false;
let userData={lists:{},templates:{},archive:{}};
let userDataRef=null, ignoreNext=false;
let authMode='login';
let pendingNoteKey=null; // {si, ii}

// ── AUTH ──
onAuthStateChanged(auth, user => {
  if(user){
    if(!ALLOWED_EMAILS.includes(user.email)){ showLoginErr("Dit e-mailadres heeft geen toegang."); signOut(auth); return; }
    currentUser=user;
    document.getElementById('loginView').style.display='none';
    document.getElementById('appView').style.display='block';
    document.getElementById('userLbl').textContent=user.email;
    subscribeData();
  } else {
    currentUser=null;
    document.getElementById('loginView').style.display='flex';
    document.getElementById('appView').style.display='none';
    if(userDataRef) off(userDataRef);
  }
});

window.toggleAuthMode=function(){
  authMode=authMode==='login'?'register':'login';
  const r=authMode==='register';
  document.getElementById('loginSubtitle').textContent=r?'Maak je account aan':'Inloggen met je account';
  document.querySelector('.login-btn').textContent=r?'Account aanmaken':'Inloggen';
  document.getElementById('loginSwitch').innerHTML=r?'Al een account? <span>Inloggen</span>':'Nog geen account? <span>Registreer hier</span>';
  document.getElementById('loginPasswordConfirmWrap').style.display=r?'block':'none';
  document.getElementById('loginForgot').style.display=r?'none':'block';
  document.getElementById('loginErr').textContent='';
};

window.handleAuth=async function(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPassword').value;
  showLoginErr('');
  if(!ALLOWED_EMAILS.includes(email)){ showLoginErr("Dit e-mailadres heeft geen toegang."); return; }
  if(authMode==='register'){
    const c=document.getElementById('loginPasswordConfirm').value;
    if(pass!==c){ showLoginErr("Wachtwoorden komen niet overeen."); return; }
    if(pass.length<6){ showLoginErr("Wachtwoord moet minstens 6 tekens zijn."); return; }
    try{ await createUserWithEmailAndPassword(auth,email,pass); } catch(e){ showLoginErr(friendlyError(e.code)); }
  } else {
    try{ await signInWithEmailAndPassword(auth,email,pass); } catch(e){ showLoginErr(friendlyError(e.code)); }
  }
};

window.resetPassword=async function(){
  const email=document.getElementById('loginEmail').value.trim();
  if(!email){ showLoginErr("Vul eerst je e-mailadres in."); return; }
  try{ await sendPasswordResetEmail(auth,email); showLoginErr("Reset-e-mail verstuurd!"); } catch(e){ showLoginErr(friendlyError(e.code)); }
};

window.doLogout=function(){ signOut(auth); };
function showLoginErr(m){ document.getElementById('loginErr').textContent=m; }
function friendlyError(c){ return({'auth/user-not-found':'Geen account gevonden.','auth/wrong-password':'Fout wachtwoord.','auth/invalid-credential':'Fout e-mailadres of wachtwoord.','auth/email-already-in-use':'Account bestaat al.','auth/too-many-requests':'Te veel pogingen, probeer later.','auth/invalid-email':'Ongeldig e-mailadres.'}[c])||'Er is iets misgegaan.'; }

// ── DATA ──
function subscribeData(){
  const uid=currentUser.uid;
  userDataRef=ref(db,`users/${uid}`);
  onValue(userDataRef,snap=>{
    if(ignoreNext){ignoreNext=false;return;}
    const val=snap.val();
    if(val){
      userData=val;
      if(!userData.lists) userData.lists={};
      if(!userData.templates) userData.templates={};
      if(!userData.archive) userData.archive={};
    } else {
      userData={lists:{},templates:{},archive:{}};
      saveUserData();
    }
    setSyncStatus(true);
    if(currentListId) renderChecklist(); else renderHome();
  },()=>setSyncStatus(false));
}

async function saveUserData(){ ignoreNext=true; await set(userDataRef,userData); setSyncStatus(true); }
function setSyncStatus(on){ document.getElementById('dot').className='sync-dot'+(on?'':' off'); }
function showStatus(msg,ms=2000){ const el=document.getElementById('status'); el.textContent=msg; if(ms) setTimeout(()=>{if(el.textContent===msg)el.textContent='';},ms); }

// ── NAVIGATION ──
window.goHome=function(){
  currentListId=null; currentListIsTemplate=false;
  document.getElementById('homeView').classList.add('active');
  document.getElementById('checklistView').classList.remove('active');
  document.getElementById('backBtn').style.display='none';
  document.getElementById('topbarTitle').textContent='Mijn Checklists';
  renderHome();
};

function openList(id, isTemplate, isArchive){
  currentListId=id; currentListIsTemplate=!!isTemplate;
  document.getElementById('homeView').classList.remove('active');
  document.getElementById('checklistView').classList.add('active');
  document.getElementById('backBtn').style.display='inline-block';
  document.getElementById('archiveBtn').style.display=isArchive?'none':'inline-block';
  renderChecklist();
}

window.switchTab=function(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['lists','templates','archive'][i]===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
};

// ── HOME RENDER ──
function formatDate(d){ if(!d) return null; const p=d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }

function renderHome(){
  document.getElementById('topbarTitle').textContent='Mijn Checklists';

  // Lists
  const lg=document.getElementById('listsGrid'); lg.innerHTML='';
  Object.values(userData.lists||{}).sort((a,b)=>(a.tripDate||'zzz').localeCompare(b.tripDate||'zzz')||(b.createdAt||0)-(a.createdAt||0)).forEach(item=>{
    lg.appendChild(makeListCard(item, false, false));
  });
  const nc=document.createElement('div'); nc.className='new-card'; nc.innerHTML='<span>+</span><p>Nieuwe checklist</p>'; nc.onclick=openNewListModal; lg.appendChild(nc);

  // Templates
  const tg=document.getElementById('templatesGrid'); tg.innerHTML='';
  Object.values(userData.templates||{}).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).forEach(item=>{
    const card=document.createElement('div'); card.className='list-card';
    card.innerHTML=`<div><span class="badge badge-tpl">TEMPLATE</span></div>
      <div class="list-card-body"><h3 id="cth-${item.id}">${item.title||'Naamloos'}</h3>
      <div class="meta">${(item.sections||[]).length} categorieën</div></div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="event.stopPropagation();inlineRename('${item.id}','tpl')">✏️ Hernoemen</button>
        <button class="card-action-btn danger" onclick="event.stopPropagation();deleteTpl('${item.id}')">✕ Verwijderen</button>
      </div>`;
    card.querySelector('.list-card-body').onclick=()=>openList(item.id,true,false);
    tg.appendChild(card);
  });

  const nt=document.createElement('div'); nt.className='new-card'; nt.innerHTML='<span>+</span><p>Nieuwe template</p>'; nt.onclick=createBlankTemplate; tg.appendChild(nt);

  // Archive
  const ag=document.getElementById('archiveGrid'); ag.innerHTML='';
  const archivedItems=Object.values(userData.archive||{}).sort((a,b)=>(b.archivedAt||0)-(a.archivedAt||0));
  if(archivedItems.length===0){ ag.innerHTML='<div style="font-size:0.82rem;color:#7a9cc4;padding:20px">Nog geen gearchiveerde lijsten.</div>'; }
  archivedItems.forEach(item=>{ ag.appendChild(makeListCard(item, false, true)); });
}

function makeListCard(item, isTemplate, isArchive){
  const secs=item.sections||[], total=secs.reduce((s,sec)=>s+(sec.items||[]).length,0);
  const done=Object.values(item.checked||{}).filter(Boolean).length, pct=total?Math.round(done/total*100):0;
  const dateStr=formatDate(item.tripDate);
  const card=document.createElement('div'); card.className='list-card';
  card.innerHTML=`
    ${isArchive?'<span class="badge badge-archive">ARCHIEF</span>':''}
    <div class="list-card-body">
      <h3 id="cth-${item.id}">${item.title||'Naamloos'}</h3>
      ${dateStr?`<div class="trip-date">✈️ ${dateStr}${item.tripDest?' · '+item.tripDest:''}</div>`:''}
      ${item.tripDest&&!dateStr?`<div class="trip-date">📍 ${item.tripDest}</div>`:''}
      <div class="meta">${done}/${total} ingepakt</div>
      <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card-actions">
      ${isArchive
        ? `<button class="card-action-btn" onclick="event.stopPropagation();unarchiveList('${item.id}')">↩ Terughalen</button>
           <button class="card-action-btn danger" onclick="event.stopPropagation();deleteArchived('${item.id}')">✕ Verwijderen</button>`
        : `<button class="card-action-btn" onclick="event.stopPropagation();inlineRename('${item.id}','list')">✏️ Hernoemen</button>
           <button class="card-action-btn" onclick="event.stopPropagation();archiveFromHome('${item.id}')">📦 Archiveren</button>
           <button class="card-action-btn danger" onclick="event.stopPropagation();deleteList('${item.id}')">✕ Verwijderen</button>`
      }
    </div>`;
  card.querySelector('.list-card-body').onclick=()=>openList(item.id,false,isArchive);
  return card;
}

function inlineRename(id, type){
  const el=document.getElementById('cth-'+id); if(!el) return;
  const store=type==='list'?userData.lists:type==='tpl'?userData.templates:userData.archive;
  const inp=document.createElement('input'); inp.className='card-title-inp'; inp.value=store[id]?.title||'';
  el.replaceWith(inp); inp.focus(); inp.select();
  function commit(){ const v=inp.value.trim(); if(v&&store[id]) store[id].title=v; saveUserData(); renderHome(); }
  inp.addEventListener('blur',commit); inp.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key==='Escape')inp.blur();});
}
window.inlineRename=inlineRename;

window.deleteList=function(id){ if(!confirm('Lijst verwijderen?')) return; delete userData.lists[id]; saveUserData(); renderHome(); };
window.deleteTpl=function(id){ if(!confirm('Template verwijderen?')) return; delete userData.templates[id]; saveUserData(); renderHome(); };
window.deleteArchived=function(id){ if(!confirm('Definitief verwijderen?')) return; delete userData.archive[id]; saveUserData(); renderHome(); };

window.archiveFromHome=function(id){
  if(!userData.lists[id]) return;
  const item={...userData.lists[id], archivedAt:Date.now()};
  userData.archive[id]=item; delete userData.lists[id]; saveUserData(); renderHome();
};

window.unarchiveList=function(id){
  if(!userData.archive[id]) return;
  const item={...userData.archive[id]}; delete item.archivedAt;
  userData.lists[id]=item; delete userData.archive[id]; saveUserData(); renderHome();
};

// ── NEW LIST MODAL ──
function openNewListModal(){
  const opts=document.getElementById('templateOptions'); opts.innerHTML='';
  const blank=document.createElement('button'); blank.className='template-opt blank selected'; blank.dataset.tpl='blank'; blank.textContent='Lege lijst'; blank.onclick=()=>selectTpl('blank'); opts.appendChild(blank);
  [...Object.values(userData.templates||{})].forEach(tpl=>{
    const btn=document.createElement('button'); btn.className='template-opt'; btn.dataset.tpl=tpl.id; btn.textContent=tpl.title; btn.onclick=()=>selectTpl(tpl.id); opts.appendChild(btn);
  });
  document.getElementById('newListName').value='';
  document.getElementById('newListDate').value='';
  document.getElementById('newListDest').value='';
  document.getElementById('newListModal').classList.add('open');
  setTimeout(()=>document.getElementById('newListName').focus(),100);
}

function selectTpl(id){ document.querySelectorAll('.template-opt').forEach(b=>b.classList.toggle('selected',b.dataset.tpl===id)); }
window.closeModal=function(id){ document.getElementById(id).classList.remove('open'); };


window.createList=function(){
  const name=document.getElementById('newListName').value.trim(); if(!name){document.getElementById('newListName').focus();return;}
  const sel=document.querySelector('.template-opt.selected'), tplId=sel?sel.dataset.tpl:'blank';
  const tpl=tplId!=='blank'?(userData.templates[tplId]||null):null;
  const id='list_'+Date.now();
  userData.lists[id]={id,title:name,sections:tpl?JSON.parse(JSON.stringify(tpl.sections)):[],notes:tpl&&tpl.notes?JSON.parse(JSON.stringify(tpl.notes)):{},checked:{},createdAt:Date.now(),
    tripDate:document.getElementById('newListDate').value||null,
    tripDest:document.getElementById('newListDest').value.trim()||null};
  closeModal('newListModal'); saveUserData(); openList(id,false,false);
};

function createBlankTemplate(){
  const id='tpl_'+Date.now();
  userData.templates[id]={id,title:'Nieuwe template',sections:[],createdAt:Date.now(),owner:currentUser.email};
  saveUserData(); openList(id,true,false); setTimeout(()=>editClTitle(),200);
}

// ── SAVE AS TEMPLATE / DUPLICATE / ARCHIVE ──
window.saveAsTemplate=function(){
  const cur=currentData();
  document.getElementById('templateName').value=cur.title+' (template)';
  document.getElementById('saveTemplateModal').classList.add('open');
  setTimeout(()=>document.getElementById('templateName').focus(),100);
};

window.confirmSaveTemplate=async function(){
  const name=document.getElementById('templateName').value.trim(); if(!name) return;
  const cur=currentData();
  const id='tpl_'+Date.now();
  const tplData={id,title:name,sections:JSON.parse(JSON.stringify(cur.sections||[])),createdAt:Date.now(),owner:currentUser.email};
  userData.templates[id]=tplData;
  closeModal('saveTemplateModal'); saveUserData();
  showStatus('Opgeslagen als template!',3000);
};

window.duplicateList=function(){
  const cur=currentData();
  const id='list_'+Date.now();
  userData.lists[id]={...JSON.parse(JSON.stringify(cur)),id,title:cur.title+' (kopie)',checked:{},createdAt:Date.now()};
  saveUserData(); showStatus('Lijst gedupliceerd!',2000); renderHome();
  setTimeout(()=>{ goHome(); switchTab('lists'); },500);
};

window.archiveList=function(){
  if(!currentListId||currentListIsTemplate) return;
  if(!confirm('Deze lijst archiveren?')) return;
  const item={...userData.lists[currentListId],archivedAt:Date.now()};
  userData.archive[currentListId]=item; delete userData.lists[currentListId];
  saveUserData(); goHome();
};

// ── CURRENT DATA ──
function currentData(){
  return currentListIsTemplate?(userData.templates[currentListId]||{}):(userData.lists[currentListId]||userData.archive[currentListId]||{});
}
function updateCurrent(fn){
  const store=currentListIsTemplate?userData.templates:(userData.lists[currentListId]?userData.lists:userData.archive);
  fn(store[currentListId]); saveUserData();
}

// ── TRIP INFO BAR ──
function renderTripInfo(){
  const bar=document.getElementById('tripInfoBar');
  if(currentListIsTemplate){ bar.style.display='none'; return; }
  bar.style.display='flex';
  const data=currentData();

  bar.innerHTML='';
  // Departure date
  const dateField=document.createElement('div'); dateField.className='trip-info-field';
  dateField.innerHTML=`<span>✈️ Vertrek:</span>`;
  const dateInp=document.createElement('input'); dateInp.type='date'; dateInp.value=data.tripDate||'';
  dateInp.style.cursor='pointer';
  dateInp.onchange=()=>{ updateCurrent(d=>d.tripDate=dateInp.value||null); renderHome(); };
  dateField.appendChild(dateInp); bar.appendChild(dateField);

  // Destination
  const destField=document.createElement('div'); destField.className='trip-info-field';
  destField.innerHTML=`<span>📍 Bestemming:</span>`;
  const destInp=document.createElement('input'); destInp.type='text'; destInp.value=data.tripDest||''; destInp.placeholder='Toevoegen…';
  destInp.style.cssText='border:none;outline:none;font-family:inherit;font-size:0.78rem;color:#1565C0;font-weight:600;background:transparent;width:140px';
  destInp.onblur=()=>{ updateCurrent(d=>d.tripDest=destInp.value.trim()||null); renderHome(); };
  destInp.onkeydown=e=>{ if(e.key==='Enter') destInp.blur(); };
  destField.appendChild(destInp); bar.appendChild(destField);
}

// ── CHECKLIST RENDER ──
function renderChecklist(){
  const data=currentData();
  document.getElementById('topbarTitle').textContent=data.title||'';
  const titleEl=document.getElementById('clTitle'); if(titleEl) titleEl.textContent=data.title||'';
  document.getElementById('clSub').textContent=currentListIsTemplate?'Template – bewerkingen worden opgeslagen':'Klik op ☐ om af te vinken · klik op tekst om te bewerken';
  renderTripInfo();

  const grid=document.getElementById('grid'); grid.innerHTML='';
  let total=0,done=0;

  (data.sections||[]).forEach((sec,si)=>{
    let secDone=0;
    const div=document.createElement('div'); div.className='section'; div.draggable=true; div.dataset.si=si;
    const head=document.createElement('div'); head.className='sec-head';
    const handle=document.createElement('span'); handle.className='drag-handle'; handle.textContent='⠿'; handle.title='Sleep om volgorde te wijzigen';
    const ts=document.createElement('span'); ts.className='sec-title'; ts.id='sec-title-'+si; ts.textContent=sec.title; ts.title='Klik om te bewerken'; ts.onclick=()=>editSecTitle(si);
    const cnt=document.createElement('span'); cnt.className='sec-count';
    const db2=document.createElement('button'); db2.className='del-sec'; db2.textContent='✕'; db2.onclick=(e)=>{e.stopPropagation();deleteSection(si);};
    head.appendChild(handle); head.appendChild(ts); head.appendChild(cnt); head.appendChild(db2);

    const itemsDiv=document.createElement('div'); itemsDiv.className='items';

    (sec.items||[]).forEach((item,ii)=>{
      const k=`${si}-${ii}`, checked=!!(data.checked&&data.checked[k]);
      if(checked) secDone++; total++; if(checked) done++;
      const noteKey=`${si}-${ii}-note`;
      const note=(data.notes&&data.notes[noteKey])||'';

      const row=document.createElement('div'); row.className='item'+(checked?' done':'');
      row.draggable=true; row.dataset.si=si; row.dataset.ii=ii;

      const idh=document.createElement('span'); idh.className='item-drag-handle'; idh.textContent='⠿'; idh.title='Sleep om volgorde te wijzigen';

      const box=document.createElement('div'); box.className='box'; if(checked) box.textContent='✓';
      box.onclick=()=>toggleItem(si,ii);

      const content=document.createElement('div'); content.className='item-content';
      const lbl=document.createElement('span'); lbl.className='lbl'; lbl.textContent=item; lbl.title='Klik om te bewerken'; lbl.onclick=()=>editItemLabel(si,ii,lbl);
      content.appendChild(lbl);
      if(note){ const nd=document.createElement('span'); nd.className='item-note'; nd.textContent=note; nd.onclick=()=>openNoteModal(si,ii,note); content.appendChild(nd); }

      const actions=document.createElement('div'); actions.className='item-actions';
      const noteBtn=document.createElement('button'); noteBtn.className='note-btn'; noteBtn.textContent='📝'; noteBtn.title='Notitie'; noteBtn.onclick=(e)=>{e.stopPropagation();openNoteModal(si,ii,note);};
      const del=document.createElement('button'); del.className='del-item'; del.textContent='✕'; del.onclick=(e)=>{e.stopPropagation();delItem(si,ii);};
      actions.appendChild(noteBtn); actions.appendChild(del);

      row.appendChild(idh); row.appendChild(box); row.appendChild(content); row.appendChild(actions);

      // Item drag events
      row.addEventListener('dragstart',e=>{ e.stopPropagation(); e.dataTransfer.setData('item-drag',JSON.stringify({si,ii})); e.dataTransfer.effectAllowed='move'; setTimeout(()=>row.classList.add('item-dragging'),0); });
      row.addEventListener('dragend',()=>{ row.classList.remove('item-dragging'); document.querySelectorAll('.item').forEach(r=>r.classList.remove('item-drag-over')); });
      row.addEventListener('dragover',e=>{ if(!e.dataTransfer.types.includes('item-drag')) return; e.preventDefault(); e.stopPropagation(); document.querySelectorAll('.item').forEach(r=>r.classList.remove('item-drag-over')); row.classList.add('item-drag-over'); });
      row.addEventListener('dragleave',()=>row.classList.remove('item-drag-over'));
      row.addEventListener('drop',e=>{
        if(!e.dataTransfer.types.includes('item-drag')) return;
        e.preventDefault(); e.stopPropagation(); row.classList.remove('item-drag-over');
        const {si:fsi,ii:fii}=JSON.parse(e.dataTransfer.getData('item-drag'));
        const tsi=parseInt(row.dataset.si), tii=parseInt(row.dataset.ii);
        if(fsi===tsi&&fii===tii) return;
        const store=currentListIsTemplate?userData.templates:(userData.lists[currentListId]?userData.lists:userData.archive);
        const d=store[currentListId];
        if(fsi===tsi){
          const items=d.sections[fsi].items; const [moved]=items.splice(fii,1); items.splice(tii,0,moved);
          const oldLen=items.length;
          const remapIdx=(oldIdx)=>{ if(oldIdx===fii) return tii; if(fii<tii&&oldIdx>fii&&oldIdx<=tii) return oldIdx-1; if(fii>tii&&oldIdx>=tii&&oldIdx<fii) return oldIdx+1; return oldIdx; };
          const nc={}, nn={};
          Object.keys(d.checked||{}).forEach(k=>{ const p=k.split('-'); if(parseInt(p[0])===fsi&&!k.includes('note')){ const ni=remapIdx(parseInt(p[1])); nc[`${fsi}-${ni}`]=d.checked[k]; } else nc[k]=d.checked[k]; });
          Object.keys(d.notes||{}).forEach(k=>{ const p=k.split('-'); if(parseInt(p[0])===fsi&&p[2]==='note'){ const ni=remapIdx(parseInt(p[1])); if(d.notes[k]) nn[`${fsi}-${ni}-note`]=d.notes[k]; } else nn[k]=d.notes[k]; });
          d.checked=nc; d.notes=nn;
        } else {
          const [moved]=d.sections[fsi].items.splice(fii,1);
          d.sections[tsi].items.splice(tii,0,moved);
          const movedNote=d.notes&&d.notes[`${fsi}-${fii}-note`];
          const nc={}, nn={};
          Object.keys(d.checked||{}).forEach(k=>{ const p=k.split('-'); const ki=parseInt(p[0]),ii2=parseInt(p[1]); if(ki===fsi&&ii2===fii) return; if(ki===fsi&&ii2>fii) nc[`${fsi}-${ii2-1}`]=d.checked[k]; else nc[k]=d.checked[k]; });
          nc[`${tsi}-${tii}`]=false;
          Object.keys(d.notes||{}).forEach(k=>{ const p=k.split('-'); if(p[2]!=='note') return; const ki=parseInt(p[0]),ii2=parseInt(p[1]); if(ki===fsi&&ii2===fii) return; if(ki===fsi&&ii2>fii) nn[`${fsi}-${ii2-1}-note`]=d.notes[k]; else if(ki===tsi&&ii2>=tii) nn[`${tsi}-${ii2+1}-note`]=d.notes[k]; else nn[k]=d.notes[k]; });
          if(movedNote) nn[`${tsi}-${tii}-note`]=movedNote;
          d.checked=nc; d.notes=nn;
        }
        renderChecklist(); saveUserData();
      });

      itemsDiv.appendChild(row);
    });

    cnt.textContent=`${secDone}/${sec.items.length}`;
    const addRow=document.createElement('div'); addRow.className='add-row'; addRow.innerHTML='<div class="add-box">+</div><input class="add-inp" placeholder="Toevoegen…">';
    const inp=addRow.querySelector('.add-inp'); inp.addEventListener('keydown',e=>{if(e.key==='Enter')addItem(si,inp);});
    itemsDiv.appendChild(addRow); div.appendChild(head); div.appendChild(itemsDiv); grid.appendChild(div);

    // Section drag events
    div.addEventListener('dragstart',e=>{ if(e.dataTransfer.types.includes('item-drag')) return; e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',si); setTimeout(()=>div.classList.add('dragging'),0); });
    div.addEventListener('dragend',()=>{ div.classList.remove('dragging'); document.querySelectorAll('.section').forEach(s=>s.classList.remove('drag-over')); });
    div.addEventListener('dragover',e=>{ if(e.dataTransfer.types.includes('item-drag')) return; e.preventDefault(); document.querySelectorAll('.section').forEach(s=>s.classList.remove('drag-over')); div.classList.add('drag-over'); });
    div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
    div.addEventListener('drop',e=>{
      if(e.dataTransfer.types.includes('item-drag')) return;
      e.preventDefault(); div.classList.remove('drag-over');
      const fromSi=parseInt(e.dataTransfer.getData('text/plain')), toSi=parseInt(div.dataset.si);
      if(fromSi===toSi) return;
      const store=currentListIsTemplate?userData.templates:(userData.lists[currentListId]?userData.lists:userData.archive);
      const d=store[currentListId];
      const secs=d.sections; const [moved]=secs.splice(fromSi,1); secs.splice(toSi,0,moved);
      const nc={}; Object.keys(d.checked||{}).forEach(k=>{ const p=k.split('-'); const ki=parseInt(p[0]); let nki=ki; if(ki===fromSi) nki=toSi; else if(fromSi<toSi&&ki>fromSi&&ki<=toSi) nki=ki-1; else if(fromSi>toSi&&ki>=toSi&&ki<fromSi) nki=ki+1; nc[nki+'-'+p.slice(1).join('-')]=d.checked[k]; }); d.checked=nc;
      renderChecklist(); saveUserData();
    });
  });

  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('pl').textContent=`${done} van ${total} ingepakt (${pct}%)`;
}

// ── EDIT HANDLERS ──
window.editClTitle=function(){
  const el=document.getElementById('clTitle');
  const inp=document.createElement('input'); inp.className='checklist-title-inp'; inp.value=currentData().title||'';
  el.replaceWith(inp); inp.focus(); inp.select();
  function commit(){ const v=inp.value.trim(); if(v) updateCurrent(d=>d.title=v); renderChecklist(); }
  inp.addEventListener('blur',commit); inp.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key==='Escape')inp.blur();});
};

function editSecTitle(si){
  const span=document.getElementById('sec-title-'+si); if(!span) return;
  const inp=document.createElement('input'); inp.className='sec-title-inp'; inp.value=currentData().sections[si].title;
  span.replaceWith(inp); inp.focus(); inp.select();
  function commit(){ const v=inp.value.trim(); if(v) updateCurrent(d=>d.sections[si].title=v); renderChecklist(); }
  inp.addEventListener('blur',commit); inp.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key==='Escape')inp.blur();});
}

function editItemLabel(si,ii,lbl){
  const inp=document.createElement('input'); inp.className='lbl-inp'; inp.value=currentData().sections[si].items[ii];
  lbl.replaceWith(inp); inp.focus(); inp.select();
  function commit(){ const v=inp.value.trim(); if(v) updateCurrent(d=>d.sections[si].items[ii]=v); renderChecklist(); }
  inp.addEventListener('blur',commit); inp.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key==='Escape')inp.blur();});
}

// ── NOTES ──
function openNoteModal(si,ii,current){
  pendingNoteKey={si,ii};
  document.getElementById('noteText').value=current||'';
  document.getElementById('noteModal').classList.add('open');
  setTimeout(()=>document.getElementById('noteText').focus(),100);
}

window.saveNote=function(){
  if(!pendingNoteKey) return;
  const {si,ii}=pendingNoteKey;
  const val=document.getElementById('noteText').value.trim();
  updateCurrent(d=>{ if(!d.notes) d.notes={}; if(val) d.notes[`${si}-${ii}-note`]=val; else delete d.notes[`${si}-${ii}-note`]; });
  closeModal('noteModal'); pendingNoteKey=null; renderChecklist();
};

// ── CRUD ──
window.addSection=function(){
  updateCurrent(d=>{if(!d.sections)d.sections=[];d.sections.push({title:'Nieuwe categorie',items:[]});});
  renderChecklist(); setTimeout(()=>editSecTitle((currentData().sections||[]).length-1),30);
};

function deleteSection(si){
  if(!confirm('Categorie verwijderen?')) return;
  updateCurrent(d=>{ d.sections.splice(si,1); const nc={}; Object.keys(d.checked||{}).forEach(k=>{const p=k.split('-'),ki=parseInt(p[0]);if(ki<si)nc[k]=d.checked[k];else if(ki>si)nc[(ki-1)+'-'+p.slice(1).join('-')]=d.checked[k];}); d.checked=nc; }); renderChecklist();
}

function addItem(si,input){
  const v=input.value.trim(); if(!v) return;
  updateCurrent(d=>d.sections[si].items.push(v)); input.value=''; renderChecklist();
  setTimeout(()=>{const ins=document.querySelectorAll('.add-inp');if(ins[si])ins[si].focus();},20);
}

function delItem(si,ii){
  updateCurrent(d=>{ d.sections[si].items.splice(ii,1); const nc={}; Object.keys(d.checked||{}).forEach(k=>{const p=k.split('-');if(parseInt(p[0])!==si){nc[k]=d.checked[k];return;}const idx=parseInt(p[1]);if(idx<ii)nc[k]=d.checked[k];else if(idx>ii)nc[`${si}-${idx-1}`]=d.checked[k];}); d.checked=nc; }); renderChecklist();
}

function toggleItem(si,ii){
  updateCurrent(d=>{if(!d.checked)d.checked={};d.checked[`${si}-${ii}`]=!d.checked[`${si}-${ii}`];}); renderChecklist();
}

window.resetChecked=function(){
  if(!confirm('Alle vinkjes resetten?')) return;
  updateCurrent(d=>d.checked={}); renderChecklist();
};
</script>
